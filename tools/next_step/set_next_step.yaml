identity:
  author: qaqab
  name: set_next_step
  label:
    en_US: Set Next Step
    zh_Hans: 设置下一步
description:
  human:
    en_US: Set the next task state, objective, and reasoning effort for the next model call.
    zh_Hans: |-
      设置任务下一轮的执行状态、目标和 reasoning effort。可与业务工具并发调用。
      **next_state：**下一轮状态, 可选： plan / act / observe / verify / write_output
      **next_effort：**下一轮的 resoning effort， 可选： low / medium / high / xhigh
      **next_objective：**下一轮要完成的具体目标，保持简短。
      **effort_reason：**下一轮 resoning effort 选择的理解。
  llm: |-
    设置任务下一轮的执行状态、目标和 reasoning effort。可与业务工具并发调用。
    **next_state：**下一轮状态, 可选： plan / act / observe / verify / write_output
    **next_effort：**下一轮的 resoning effort， 可选： low / medium / high / xhigh
    **next_objective：**下一轮要完成的具体目标，保持简短。
    **effort_reason：**下一轮 resoning effort 选择的理解。
parameters:
  - name: next_state
    type: select
    required: true
    form: llm
    options:
      - value: plan
        label: {en_US: Plan, zh_Hans: 规划}
      - value: act
        label: {en_US: Act, zh_Hans: 执行}
      - value: observe
        label: {en_US: Observe, zh_Hans: 观察}
      - value: verify
        label: {en_US: Verify, zh_Hans: 验证}
      - value: write_output
        label: {en_US: Write Output, zh_Hans: 输出结果}
    label: {en_US: Next State, zh_Hans: 下一步状态}
    human_description:
      en_US: "Next-round execution state: plan, act, observe, verify, or write_output."
      zh_Hans: "下一轮状态，可选：plan / act / observe / verify / write_output。"
    llm_description: "下一轮状态。只能选择 plan / act / observe / verify / write_output。"
  - name: next_effort
    type: select
    required: true
    form: llm
    options:
      - value: low
        label: {en_US: Low, zh_Hans: 低}
      - value: medium
        label: {en_US: Medium, zh_Hans: 中}
      - value: high
        label: {en_US: High, zh_Hans: 高}
      - value: xhigh
        label: {en_US: Extra High, zh_Hans: 极高}
    label: {en_US: Reasoning Effort, zh_Hans: 推理强度}
    human_description:
      en_US: "Reasoning effort for the next model call: low, medium, high, or xhigh."
      zh_Hans: "下一轮的 resoning effort，可选：low / medium / high / xhigh。"
    llm_description: "下一轮的 resoning effort。只能选择 low / medium / high / xhigh。"
  - name: next_objective
    type: string
    required: true
    form: llm
    label: {en_US: Next Objective, zh_Hans: 下一步目标}
    human_description:
      en_US: "Short, concrete objective for the next round."
      zh_Hans: "下一轮要完成的具体目标，保持简短。"
    llm_description: "下一轮要完成的具体目标，保持简短。"
  - name: effort_reason
    type: string
    required: true
    form: llm
    label: {en_US: Effort Reason, zh_Hans: 强度理由}
    human_description:
      en_US: "Why the selected reasoning effort is appropriate for the next round."
      zh_Hans: "下一轮 resoning effort 选择的理解。"
    llm_description: "下一轮 resoning effort 选择的理解。"
extra:
  python:
    source: tools/next_step/set_next_step.py
